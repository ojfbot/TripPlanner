name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone frame-ui-components (file: protocol dep)
        run: git clone --depth 1 https://github.com/ojfbot/frame-ui-components.git ../frame-ui-components
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build agent-graph (required by api type-check)
        run: pnpm --filter @tripplanner/agent-graph build
      - run: pnpm build
      - name: Build Storybook
        run: pnpm --filter @tripplanner/browser-app build-storybook
